openapi: '3.0.3'
info:
  title: 'Topcon Dispatch External Integrations API'
  version: '1.27.0'
  description: 'Topcon Dispatch External Integrations API exposes the multi-tenant REST surface used to synchronize master data, commercial records, scheduling data, plant automation events, and fiscal artifacts with upstream systems. The API returns a consistent response envelope for both success and error cases, supports lookups by internal and external identifiers, and relies on gateway-level authentication plus tenant-scoping headers.'
servers:
  - url: 'https://api.topconsuite.io/dispatch'
    description: 'Production API gateway'
  - url: 'http://localhost:4005/dispatch'
    description: 'Local development server'
security:
  - SubscriptionKeyAuth: []
    TenantHeaderAuth: []
    BearerAuth: []
