paths:
  '/integrations/AdditionalFeesContract/{id}':
    get:
      summary: 'Get an Additional Fees Contract by ID'
      description: |-
        Retrieves a single **Additional Fees Contract** using the internal Topcon identifier.
        
        - Use this route when the caller already stores the platform `id`.
        - Requires **subscription key**, **tenant header**, and **bearer token** context.
      operationId: 'getAdditionalFeesContractById'
      tags:
        - 'Additional Fees Contract'
      parameters:
        - '$ref': '#/components/parameters/SubscriptionKeyHeader'
        - '$ref': '#/components/parameters/TenantIdHeader'
        - name: 'id'
          in: 'path'
          required: true
          description: 'Unique identifier of the Additional Fees Contract record.'
          schema:
            type: 'string'
            format: 'uuid'
          example: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
      responses:
        '200':
          description: 'Successful response returned in the standard integration envelope.'
          content:
            'application/json':
              schema:
                '$ref': '#/components/schemas/AdditionalFeesContractResponse'
              example:
                status: 'success'
                message: 'Additional Fees Contract retrieved successfully.'
                result:
                  id: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
                  externalId: 'EXT-ADDITIONALFEESCONTRACT-1001'
                  createdAt: '2026-04-16T10:00:00Z'
                  updatedAt: '2026-04-16T11:15:00Z'
                  deleted: false
                  deletedAt: null
                  contractId: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
                  itemSequence: 1001
                  additionalFeesTypeId: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
                  conditions:
                    referenceUnit: 'M3'
                    referenceValue: 7
                    referenceCriteria: 'Below'
                    concreteApplicationMode:
                      - 'Pumped'
                      - 'Conventional'
                  execution:
                    method: 'AUTOMATIC'
                    effectiveAt: '2026-04-16T10:00:00Z'
                  additionalFeesText: 'additional Fees Text sample'
                errorCode: null
                notifications: []
        '400':
          description: 'Request rejected because the supplied path, query, or body values are syntactically invalid for this operation.'
          content:
            'application/json':
              schema:
                '$ref': '#/components/schemas/ErrorResponse'
              example:
                status: 'error'
                message: 'The request payload or filters are invalid.'
                errorCode: '10000'
                notifications:
                  - 'Review the supplied parameters and try again.'
        '401':
          description: 'Request rejected because the gateway or upstream security layer did not accept the caller credentials.'
          content:
            'application/json':
              schema:
                '$ref': '#/components/schemas/ErrorResponse'
              example:
                status: 'error'
                message: 'Unauthorized request.'
                errorCode: '401'
                notifications:
                  - 'Provide a valid bearer token and subscription key.'
        '403':
          description: 'Request rejected because the caller is authenticated but is not allowed to access the requested tenant or resource.'
          content:
            'application/json':
              schema:
                '$ref': '#/components/schemas/ErrorResponse'
              example:
                status: 'error'
                message: 'Forbidden request for the supplied tenant context.'
                errorCode: '403'
                notifications:
                  - 'Verify the caller permissions and tenant scope.'
        '404':
          description: 'Requested record was not found for the supplied identifier or filter.'
          content:
            'application/json':
              schema:
                '$ref': '#/components/schemas/ErrorResponse'
              example:
                status: 'error'
                message: 'Requested resource was not found.'
                errorCode: '404'
                notifications:
                  - 'Verify the identifier informed in the request.'
