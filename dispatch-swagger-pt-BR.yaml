components:
  schemas:
    StandardResponseBase:
      type: 'object'
      description: 'Envelope base de resposta retornado pela API publica de integracao.'
      properties:
        status:
          type: 'string'
          enum:
            - 'success'
            - 'alert'
            - 'error'
          description: 'Status de execucao retornado pela API.'
          example: 'success'
        message:
          type: 'string'
          description: 'Mensagem legivel retornada pela API.'
          example: 'Operação concluída com sucesso.'
        errorCode:
          type: 'string'
          nullable: true
          description: 'Codigo de erro especifico da aplicacao retornado para falhas de validação ou processamento.'
          example: null
        notifications:
          type: 'array'
          nullable: true
          description: 'Notificacoes de validação ou negócio coletadas durante o processamento da requisição.'
          items:
            type: 'string'
            example: 'O valor de status e inválido para está operação.'
      required:
        - 'status'
        - 'message'
    ErrorResponse:
      allOf:
        - '$ref': '#/components/schemas/StandardResponseBase'
      description: 'Envelope padrão de erro retornado pela API publica de integracao.'
      example:
        status: 'error'
        message: 'O payload ou os filtros da requisição são inválidos.'
        errorCode: '10000'
        notifications:
          - 'Revise os parâmetros informados e tente novamente.'
    DeleteResult:
      type: 'object'
      description: 'Referencia retornada apos a conclusao de uma operação de exclusão.'
      properties:
        id:
          type: 'string'
          format: 'uuid'
          description: 'Identificador interno do registro excluído.'
          example: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
        externalId:
          type: 'string'
          description: 'Identificador externo do registro excluído, quando existir.'
          example: 'EXT-1001'
        deleted:
          type: 'boolean'
          description: 'Sempre `true` quando a operação de exclusão foi concluída com sucesso.'
          example: true
      required:
        - 'id'
        - 'deleted'
    AdditionalFeesContractResponse:
      allOf:
        - '$ref': '#/components/schemas/StandardResponseBase'
        - type: 'object'
          description: 'Envelope de sucesso que encapsula um único resultado de Contrato de Taxas Adicionais.'
          properties:
            result:
              '$ref': '#/components/schemas/AdditionalFeesContractResource'
          required:
            - 'result'
    AdditionalFeesContractListResponse:
      allOf:
        - '$ref': '#/components/schemas/StandardResponseBase'
        - type: 'object'
          description: 'Envelope de sucesso que encapsula uma lista de resultados de Contrato de Taxas Adicionais.'
          properties:
            result:
              type: 'array'
              items:
                '$ref': '#/components/schemas/AdditionalFeesContractResource'
          required:
            - 'result'
    AdditionalFeesContractDeleteResponse:
      allOf:
        - '$ref': '#/components/schemas/StandardResponseBase'
        - type: 'object'
          description: 'Envelope de sucesso retornado apos excluir um registro de Contrato de Taxas Adicionais.'
          properties:
            result:
              '$ref': '#/components/schemas/DeleteResult'
          required:
            - 'result'
    AdditionalFeesContractCreateRequest:
      type: 'object'
      description: 'Payload usado para create a Additional Fees contrato registro through o external integrations API.'
      properties:
        externalId:
          type: 'string'
          description: 'Identificador externo usado para correlacionar o registro Additional Fees Contract com uma plataforma de origem.'
          example: 'EXT-ADDITIONALFEESCONTRACT-1001'
          maxLength: 130
        contractId:
          type: 'string'
          format: 'uuid'
          description: 'Chave estrangeira to contrato Restricoes: Required'
          example: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
        itemSequence:
          type: 'integer'
          description: 'Sequence Numero de o item'
          example: 1001
        additionalFeesTypeId:
          type: 'string'
          format: 'uuid'
          description: 'Chave estrangeira to AdditionalFeesType Restricoes: Required'
          example: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
        conditions:
          type: 'object'
          additionalProperties: true
          description: 'condicaos related to o additional fee Restricoes: Required'
          example:
            referenceUnit: 'M3'
