          type: 'boolean'
          description: 'Wheor pump services are fully taxed'
          example: true
          default: false
        serviceRelatedPercentage:
          type: 'number'
          description: 'o percentage related to services Restricoes: Precisao: 18 / Escala: 2'
          example: 12.5
          multipleOf: 0.01
        state:
          type: 'string'
          description: 'o state code Restricoes: Tamanho maximo: 50'
          example: 'state sample'
          maxLength: 50
        withheldIssTaxRate:
          type: 'number'
          description: 'o withheld ISS tax rate Restricoes: Precisao: 18 / Escala: 2'
