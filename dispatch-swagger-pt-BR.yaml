openapi: '3.0.3'
info:
  title: 'API de Integrações Externas do Topcon Dispatch'
  version: '1.27.0'
  description: 'A API de Integrações Externas do Topcon Dispatch expõe a superfície REST multi-tenant usada para sincronizar dados mestres, registros comerciais, dados de programação, eventos de automação de planta e artefatos fiscais com sistemas de origem. A API retorna um envelope de resposta consistente para casos de sucesso e erro, suporta consultas por identificadores internos e externos e depende de autenticação no gateway e cabeçalhos de escopo de tenant.'
servers:
  - url: 'https://api.topconsuite.io/dispatch'
    description: 'Gateway da API de produção'
  - url: 'http://localhost:4005/dispatch'
    description: 'Servidor local de desenvolvimento'
security:
  - SubscriptionKeyAuth: []
    TenantHeaderAuth: []
    BearerAuth: []
