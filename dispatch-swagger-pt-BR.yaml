          type: 'string'
          enum:
            - 'SERVICE'
            - 'INVOICE_TOTAL'
            - 'FIXED_PERCENTAGE_OF_INVOICE'
            - 'DEDUCTIBLE_PERCENTAGE_OF_MATERIAL'
            - 'LIMITED_PERCENTAGE_OF_MATERIAL'
            - 'NOT_SPECIFIED'
          example: 'SERVICE'
          description: 'o base type para ISS tax calculation'
