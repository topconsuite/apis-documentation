paths:
  '/integrations/AdditionalFeesContract/{id}':
    get:
      summary: 'Obter um Contrato de Taxas Adicionais por ID'
      description: |-
        Recupera um único **Contrato de Taxas Adicionais** usando o identificador interno da Topcon.
        
        - Use esta rota quando o chamador já armazenar o `id` da plataforma.
        - Exige **subscription key**, **tenant header** e contexto de **bearer token**.
      operationId: 'getAdditionalFeesContractById'
      tags:
        - 'Additional Fees Contract'
      parameters:
        - '$ref': '#/components/parameters/SubscriptionKeyHeader'
        - '$ref': '#/components/parameters/TenantIdHeader'
        - name: 'id'
          in: 'path'
          required: true
          description: 'Identificador único do registro Contrato de Taxas Adicionais.'
          schema:
            type: 'string'
            format: 'uuid'
          example: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
      responses:
        '200':
          description: 'Resposta de sucesso retornada no envelope padrão de integracao.'
          content:
            'application/json':
              schema:
                '$ref': '#/components/schemas/AdditionalFeesContractResponse'
              example:
                status: 'success'
                message: 'Contrato de Taxas Adicionais recuperado com sucesso.'
                result:
                  id: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
                  externalId: 'EXT-ADDITIONALFEESCONTRACT-1001'
                  createdAt: '2026-04-16T10:00:00Z'
                  updatedAt: '2026-04-16T11:15:00Z'
                  deleted: false
                  deletedAt: null
                  contractId: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
                  itemSequence: 1001
                  additionalFeesTypeId: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
                  conditions:
                    referenceUnit: 'M3'
                    referenceValue: 7
                    referenceCriteria: 'Below'
                    concreteApplicationMode:
                      - 'Pumped'
                      - 'Conventional'
                  execution:
                    method: 'AUTOMATIC'
                    effectiveAt: '2026-04-16T10:00:00Z'
                  additionalFeesText: 'additional Fees Text sample'
                errorCode: null
                notifications: []
