    DeliveryResource:
      type: 'object'
      description: 'Hydrated entrega recurso retornado pelo o external integrations API.'
      properties:
        id:
          type: 'string'
          format: 'uuid'
          description: 'Identificador único do registro Delivery retornado pelo Topcon Dispatch.'
          example: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
        externalId:
          type: 'string'
          description: 'Identificador externo usado para correlacionar o registro Delivery com uma plataforma de origem.'
          example: 'EXT-DELIVERY-1001'
          maxLength: 130
        createdAt:
          type: 'string'
          format: 'date-time'
          description: 'Timestamp que registra quando o registro Delivery foi criado no Topcon Dispatch.'
          example: '2026-04-16T10:00:00Z'
        updatedAt:
          type: 'string'
          format: 'date-time'
          nullable: true
          description: 'Timestamp que registra a ultima atualização aplicada ao registro Entrega.'
          example: '2026-04-16T11:15:00Z'
        deleted:
          type: 'boolean'
          description: 'Indica se o registro Delivery foi excluído logicamente.'
          example: false
        deletedAt:
          type: 'string'
          format: 'date-time'
          nullable: true
          description: 'Timestamp que registra quando o registro Delivery foi excluído logicamente, quando aplicavel.'
          example: null
        schedulingId:
          type: 'string'
          format: 'uuid'
          description: 'Chave estrangeira to Scheduling'
          example: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
        reservationId:
          type: 'string'
          format: 'uuid'
          description: 'Chave estrangeira to Reservation'
          example: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
        volume:
          type: 'number'
          description: 'Volume de o entrega Restricoes: Precisao: 5 / Escala: 1'
          example: 8.5
          multipleOf: 0.1
        vehicleId:
          type: 'string'
          format: 'uuid'
          description: 'Chave estrangeira to veiculo'
          example: '6f5d8a4b-9f7a-4d20-8c10-5d8ce5b1a001'
        loadingForecast:
          type: 'string'
          format: 'date-time'
          description: 'paraecasted hora para loading'
          example: '2026-04-16T10:00:00Z'
        onTheWayForecast:
          type: 'string'
          format: 'date-time'
          description: 'paraecasted hora para being on o way'
          example: '2026-04-16T10:00:00Z'
        atConstructionForecast:
          type: 'string'
          format: 'date-time'
          description: 'paraecasted hora para arriving at obra'
          example: '2026-04-16T10:00:00Z'
        startUnloadingForecast:
          type: 'string'
          format: 'date-time'
          description: 'paraecasted hora para starting unloading'
          example: '2026-04-16T10:00:00Z'
        finishUnloadingForecast:
          type: 'string'
          format: 'date-time'
          description: 'paraecasted hora para finishing unloading'
          example: '2026-04-16T10:00:00Z'
        returningForecast:
          type: 'string'
          format: 'date-time'
          description: 'paraecasted hora para returning'
          example: '2026-04-16T10:00:00Z'
        atThePlantForecast:
          type: 'string'
          format: 'date-time'
          description: 'paraecasted hora para arriving back at o plant'
          example: '2026-04-16T10:00:00Z'
        status:
          type: 'string'
          enum:
            - 'RELEASED'
            - 'DELIVERED'
            - 'BLOCKED'
            - 'CANCELLED'
            - 'INVOICE_CANCELLED'
            - 'CONTRACT_TERMINATED'
            - 'SELECTED_FOR_BATCH_ISSUANCE'
            - 'RESERVED'
          example: 'RELEASED'
          description: 'Status do ciclo de vida do recurso Delivery.'
          default: 'RELEASED'
        sequence:
          type: 'integer'
          description: 'Sequence Numero de o entrega'
          example: 1001
      required:
        - 'id'
        - 'createdAt'
        - 'deleted'
