          type: 'boolean'
          description: 'Wheor extra taxes are fully taxed'
          example: true
          default: false
        fiscalMessage:
          type: 'string'
          description: 'A message related to fiscal inparamation Restricoes: Tamanho maximo: 255'
          example: 'fiscal Message sample'
          maxLength: 255
