  # ── Cost Supplies ──
  /integrations/costsupplies:
    post:
      tags: [CostSupplies]
      summary: Create a new cost supply record
      description: |
        Creates a single cost supply record linking a supply to a supplier, batching plant,
        and pricing information. Use either the entity ID or external ID to link child entities
        (e.g., `concreteBatchingPlantId` or `concreteBatchingPlantExternalId`).
      operationId: createCostSupply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CostSupplyInput'
            example:
              active: true
              costValue: 125.50
              freightValue: 15.00
              conversionFactor: 1.0
              effectiveDate: "2025-03-01"
              lossPercentage: 2.5
              sandMoistureLevel: 0
              externalId: EXT-CS-001
              supplyExternalId: EXT-SUP-001
              supplierExternalId: EXT-SUPPLIER-001
              concreteBatchingPlantExternalId: EXT-CBP-001
              purchaseMeasureUnitTypeExternalId: EXT-MUT-KG
              useMeasureUnitTypeExternalId: EXT-MUT-KG
      responses:
        '201':
          description: Cost supply created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostSupplyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        x-codeSamples:
          - lang: curl
            source: |
              curl -X POST https://api.topconsuite.io/tech-hml/integrations/costsupplies \
                -H "Authorization: Bearer <token>" \
                -H "Ocp-Apim-Subscription-Key: <key>" \
                -H "Content-Type: application/json" \
                -d '{"active":true,"costValue":125.5,"freightValue":15.0,"conversionFactor":1.0,"effectiveDate":"2025-03-01","lossPercentage":2.5,"sandMoistureLevel":0,"externalId":"EXT-CS-001","supplyExternalId":"EXT-SUP-001","supplierExternalId":"EXT-SUPPLIER-001","concreteBatchingPlantExternalId":"EXT-CBP-001","purchaseMeasureUnitTypeExternalId":"EXT-MUT-KG","useMeasureUnitTypeExternalId":"EXT-MUT-KG"}'
          - lang: javascript
            source: |
              const response = await fetch('https://api.topconsuite.io/tech-hml/integrations/costsupplies', {
                method: 'POST',
                headers: {
                  'Authorization': 'Bearer <token>',
                  'Ocp-Apim-Subscription-Key': '<key>',
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  active: true,
                  costValue: 125.5,
                  freightValue: 15.0,
                  conversionFactor: 1.0,
                  effectiveDate: '2025-03-01',
                  lossPercentage: 2.5,
                  sandMoistureLevel: 0,
                  externalId: 'EXT-CS-001',
                  supplyExternalId: 'EXT-SUP-001',
                  supplierExternalId: 'EXT-SUPPLIER-001',
                  concreteBatchingPlantExternalId: 'EXT-CBP-001',
                  purchaseMeasureUnitTypeExternalId: 'EXT-MUT-KG',
                  useMeasureUnitTypeExternalId: 'EXT-MUT-KG'
                })
              });

              const data = await response.json();
          - lang: csharp
            source: |
              using System.Net.Http;
              using System.Net.Http.Headers;
              using System.Net.Http.Json;

              using var httpClient = new HttpClient();
              httpClient.DefaultRequestHeaders.Authorization = new AuthenticationHeaderValue("Bearer", "<token>");
              httpClient.DefaultRequestHeaders.Add("Ocp-Apim-Subscription-Key", "<key>");

              var response = await httpClient.PostAsJsonAsync(
                  "https://api.topconsuite.io/tech-hml/integrations/costsupplies",
                  new
                  {
                      active = true,
                      costValue = 125.5,
                      freightValue = 15.0,
                      conversionFactor = 1.0,
                      effectiveDate = "2025-03-01",
                      lossPercentage = 2.5,
                      sandMoistureLevel = 0,
                      externalId = "EXT-CS-001",
                      supplyExternalId = "EXT-SUP-001",
                      supplierExternalId = "EXT-SUPPLIER-001",
                      concreteBatchingPlantExternalId = "EXT-CBP-001",
                      purchaseMeasureUnitTypeExternalId = "EXT-MUT-KG",
                      useMeasureUnitTypeExternalId = "EXT-MUT-KG"
                  });

              var payload = await response.Content.ReadAsStringAsync();
          - lang: python
            source: |
              import requests

              response = requests.post(
                  'https://api.topconsuite.io/tech-hml/integrations/costsupplies',
                  headers={
                      'Authorization': 'Bearer <token>',
                      'Ocp-Apim-Subscription-Key': '<key>'
                  },
                  json={
                      'active': True,
                      'costValue': 125.5,
                      'freightValue': 15.0,
                      'conversionFactor': 1.0,
                      'effectiveDate': '2025-03-01',
                      'lossPercentage': 2.5,
                      'sandMoistureLevel': 0,
                      'externalId': 'EXT-CS-001',
                      'supplyExternalId': 'EXT-SUP-001',
                      'supplierExternalId': 'EXT-SUPPLIER-001',
                      'concreteBatchingPlantExternalId': 'EXT-CBP-001',
                      'purchaseMeasureUnitTypeExternalId': 'EXT-MUT-KG',
                      'useMeasureUnitTypeExternalId': 'EXT-MUT-KG'
                  }
              )

              data = response.json()
