openapi: 3.0.3
info:
  title: Topcon Tech Integration API
  version: 1.0.0
  description: |
    The **Topcon Tech Integration API** provides endpoints for managing concrete technology resources including supplies, suppliers, concrete batching plants, concrete recipes, and related entities. This API is designed for system-to-system integration, enabling external ERP and management systems to synchronize master data with the Topcon Suite platform.

    Authentication is handled via **Bearer JWT tokens** (single-tenant) or **API subscription keys** (multi-tenant). All responses follow a standard envelope with `status`, `message`, `result`, and optional `errorCode` fields.
  contact:
    name: Topcon Suite Support
    url: https://topconsuite.io
servers:
  - url: https://api.topconsuite.io/tech-hml
    description: Multi-tenant Beta (HML) environment
  - url: https://{client}-api.topconsuite.app/tech
    description: Single-tenant client environment
    variables:
      client:
        default: demo
        description: Client-specific subdomain prefix

tags:
  - name: Authentication
    description: Token generation and management for single-tenant environments
    x-displayName: Authentication
  - name: ClassificationSupplyTypes
    description: Manage classification types used to categorize supplies by material group
    x-displayName: Classification Supply Types
  - name: ConcreteBatchingPlants
    description: Manage concrete batching plant registrations
    x-displayName: Concrete Batching Plants
  - name: ConcreteRecipeFamilies
    description: Read and update concrete recipe family records
    x-displayName: Concrete Recipe Families
  - name: ConcreteRecipeFamilyVersions
    description: Read concrete recipe family version data including characteristics and supply details
    x-displayName: Concrete Recipe Family Versions
  - name: ConcreteRecipes
    description: Read and update concrete recipe records
    x-displayName: Concrete Recipes
  - name: CostSupplies
    description: Manage supply cost records including pricing, freight, and conversion factors
    x-displayName: Cost Supplies
  - name: IdentificationDocumentTypes
    description: Read identification document types such as CPF and CNPJ
    x-displayName: Identification Document Types
  - name: MeasureUnitTypes
    description: Manage measurement unit types used across the platform
    x-displayName: Measure Unit Types
  - name: Suppliers
    description: Manage supplier registrations with document identification
    x-displayName: Suppliers
  - name: Supplies
    description: Manage supply (material) registrations used in concrete production
    x-displayName: Supplies
  - name: TechnicalDataSupplies
    description: Manage technical data for supplies including specific mass and unit mass per batching plant
    x-displayName: Technical Data Supplies

x-tagGroups:
  - name: Authentication
    tags:
      - Authentication
  - name: Core Resources
    tags:
      - Supplies
      - Suppliers
      - CostSupplies
      - TechnicalDataSupplies
  - name: Classification & Units
    tags:
      - ClassificationSupplyTypes
      - MeasureUnitTypes
      - IdentificationDocumentTypes
  - name: Concrete Production
    tags:
      - ConcreteBatchingPlants
      - ConcreteRecipeFamilies
      - ConcreteRecipeFamilyVersions
      - ConcreteRecipes

security:
  - BearerAuth: []
  - SubscriptionKey: []

paths:
  # ── Authentication ──
  /integrationtokens/integration:
    post:
      tags: [Authentication]
      summary: Generate a new integration token
      description: |
        Generates a new Bearer token for API authentication in **single-tenant** environments.
        Only admin users can generate public integration tokens. For multi-tenant environments,
        use the `Ocp-Apim-Subscription-Key` header instead.
      operationId: generateToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
            example:
              email: admin@company.com
              password: securePassword123
      responses:
        '200':
          description: Token generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                status: success
                message: Token generated successfully
                result:
                  token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST https://api.topconsuite.io/tech-hml/integrationtokens/integration \
              -H "Content-Type: application/json" \
              -d '{"email":"admin@company.com","password":"securePassword123"}'
        - lang: javascript
          source: |
            const response = await fetch('https://api.topconsuite.io/tech-hml/integrationtokens/integration', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                email: 'admin@company.com',
                password: 'securePassword123'
              })
            });

            const data = await response.json();
        - lang: csharp
          source: |
            using System.Net.Http;
            using System.Net.Http.Json;

            using var httpClient = new HttpClient();

            var response = await httpClient.PostAsJsonAsync(
                "https://api.topconsuite.io/tech-hml/integrationtokens/integration",
                new
                {
                    email = "admin@company.com",
                    password = "securePassword123"
                });

            var payload = await response.Content.ReadAsStringAsync();
        - lang: python
          source: |
            import requests

            response = requests.post(
                'https://api.topconsuite.io/tech-hml/integrationtokens/integration',
                json={
                    'email': 'admin@company.com',
                    'password': 'securePassword123'
                }
            )

            data = response.json()

  /integrationtokens/integration/{token}:
    patch:
      tags: [Authentication]
      summary: Revoke or activate an existing token
      description: |
        Updates the status of an existing integration token. Set `active` to **false** to revoke
        or **true** to reactivate. The request must include the credentials of the user who
        originally created the token.
      operationId: updateToken
      security: []
      parameters:
        - name: token
          in: path
          required: true
          description: The token string to revoke or activate
          schema:
            type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenUpdateRequest'
            example:
              email: admin@company.com
              password: securePassword123
              active: false
      responses:
        '200':
          description: Token status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
              example:
                status: success
                message: Token revoked successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Classification Supply Types ──
  /integrations/classificationsupplytypes:
    post:
      tags: [ClassificationSupplyTypes]
      summary: Create a new classification supply type
      description: |
        Creates a single classification supply type. The `externalId` field must be unique
        across all classification supply types and is used to link records between external systems.
      operationId: createClassificationSupplyType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassificationSupplyTypeInput'
            example:
              name: Portland Cement CP-V
              group: BINDER
              externalId: EXT-CST-001
              active: true
      responses:
        '201':
          description: Classification supply type created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationSupplyTypeResponse'
              example:
                status: success
                message: Classification supply type created successfully
                result:
                  id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  name: Portland Cement CP-V
                  group: BINDER
                  active: true
                  externalId: EXT-CST-001
                  createdAt: "2025-01-15T10:30:00"
                  updatedAt: "2025-01-15T10:30:00"
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST https://api.topconsuite.io/tech-hml/integrations/classificationsupplytypes \
              -H "Authorization: Bearer <token>" \
              -H "Ocp-Apim-Subscription-Key: <key>" \
              -H "Content-Type: application/json" \
              -d '{"name":"Portland Cement CP-V","group":"BINDER","externalId":"EXT-CST-001","active":true}'
        - lang: javascript
          source: |
            const response = await fetch('https://api.topconsuite.io/tech-hml/integrations/classificationsupplytypes', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer <token>',
                'Ocp-Apim-Subscription-Key': '<key>',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                name: 'Portland Cement CP-V',
                group: 'BINDER',
                externalId: 'EXT-CST-001',
                active: true
              })
            });

            const data = await response.json();
        - lang: csharp
          source: |
            using System.Net.Http;
            using System.Net.Http.Headers;
            using System.Net.Http.Json;

            using var httpClient = new HttpClient();
            httpClient.DefaultRequestHeaders.Authorization = new AuthenticationHeaderValue("Bearer", "<token>");
            httpClient.DefaultRequestHeaders.Add("Ocp-Apim-Subscription-Key", "<key>");

            var response = await httpClient.PostAsJsonAsync(
                "https://api.topconsuite.io/tech-hml/integrations/classificationsupplytypes",
                new
                {
                    name = "Portland Cement CP-V",
                    group = "BINDER",
                    externalId = "EXT-CST-001",
                    active = true
                });

            var payload = await response.Content.ReadAsStringAsync();
        - lang: python
          source: |
            import requests

            response = requests.post(
                'https://api.topconsuite.io/tech-hml/integrations/classificationsupplytypes',
                headers={
                    'Authorization': 'Bearer <token>',
                    'Ocp-Apim-Subscription-Key': '<key>'
                },
                json={
                    'name': 'Portland Cement CP-V',
                    'group': 'BINDER',
                    'externalId': 'EXT-CST-001',
                    'active': True
                }
            )

            data = response.json()
    get:
      tags: [ClassificationSupplyTypes]
      summary: List all classification supply types
      description: |
        Returns all classification supply types, optionally filtered by update date range.
        If `end_updated_date` is not provided, defaults to the current timestamp.
        If neither date is provided, all records are returned.
      operationId: listClassificationSupplyTypes
      parameters:
        - $ref: '#/components/parameters/StartUpdatedDate'
        - $ref: '#/components/parameters/EndUpdatedDate'
      responses:
        '200':
          description: List of classification supply types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationSupplyTypeListResponse'
              example:
                status: success
                message: Records retrieved successfully
                result:
                  - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                    name: Portland Cement CP-V
                    group: BINDER
                    active: true
                    externalId: EXT-CST-001
                    createdAt: "2025-01-15T10:30:00"
                    updatedAt: "2025-01-15T10:30:00"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /integrations/classificationsupplytypes/{id}:
    get:
      tags: [ClassificationSupplyTypes]
      summary: Get a classification supply type by ID
      description: Returns a single classification supply type identified by its internal UUID.
      operationId: getClassificationSupplyTypeById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Classification supply type found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationSupplyTypeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ClassificationSupplyTypes]
      summary: Update a classification supply type by ID
      description: Updates a single classification supply type identified by its internal UUID.
      operationId: updateClassificationSupplyTypeById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassificationSupplyTypeInput'
      responses:
        '200':
          description: Classification supply type updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationSupplyTypeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [ClassificationSupplyTypes]
      summary: Delete a classification supply type by ID
      description: |
        Deletes a single classification supply type. Deletion will fail if the record
        is linked to existing supplies or cost supplies.
      operationId: deleteClassificationSupplyTypeById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Classification supply type deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /integrations/classificationsupplytypes/by-external-id/{externalId}:
    get:
      tags: [ClassificationSupplyTypes]
      summary: Get a classification supply type by external ID
      description: Returns a single classification supply type identified by its external system reference.
      operationId: getClassificationSupplyTypeByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      responses:
        '200':
          description: Classification supply type found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationSupplyTypeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ClassificationSupplyTypes]
      summary: Update a classification supply type by external ID
      description: Updates a single classification supply type identified by its external system reference.
      operationId: updateClassificationSupplyTypeByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassificationSupplyTypeInput'
      responses:
        '200':
          description: Classification supply type updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationSupplyTypeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [ClassificationSupplyTypes]
      summary: Delete a classification supply type by external ID
      description: Deletes a single classification supply type identified by its external system reference.
      operationId: deleteClassificationSupplyTypeByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      responses:
        '200':
          description: Classification supply type deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ── Concrete Batching Plants ──
  /integrations/concretebatchingplants:
    post:
      tags: [ConcreteBatchingPlants]
      summary: Create a new concrete batching plant
      description: |
        Creates a single concrete batching plant. Fields `code`, `abbreviation`, and `externalId`
        must be unique across all batching plants.
      operationId: createConcreteBatchingPlant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConcreteBatchingPlantInput'
            example:
              name: Central Plant Alpha
              abbreviation: CPA
              code: PLANT-001
              externalId: EXT-CBP-001
              active: true
      responses:
        '201':
          description: Concrete batching plant created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteBatchingPlantResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags: [ConcreteBatchingPlants]
      summary: List all concrete batching plants
      description: |
        Returns all concrete batching plants, optionally filtered by update date range.
        If `end_updated_date` is not provided, defaults to the current timestamp.
      operationId: listConcreteBatchingPlants
      parameters:
        - $ref: '#/components/parameters/StartUpdatedDate'
        - $ref: '#/components/parameters/EndUpdatedDate'
      responses:
        '200':
          description: List of concrete batching plants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteBatchingPlantListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /integrations/concretebatchingplants/{id}:
    get:
      tags: [ConcreteBatchingPlants]
      summary: Get a concrete batching plant by ID
      description: Returns a single concrete batching plant identified by its internal UUID.
      operationId: getConcreteBatchingPlantById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Concrete batching plant found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteBatchingPlantResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ConcreteBatchingPlants]
      summary: Update a concrete batching plant by ID
      description: Updates a single concrete batching plant identified by its internal UUID.
      operationId: updateConcreteBatchingPlantById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConcreteBatchingPlantInput'
      responses:
        '200':
          description: Concrete batching plant updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteBatchingPlantResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [ConcreteBatchingPlants]
      summary: Delete a concrete batching plant by ID
      description: |
        Deletes a single concrete batching plant. Deletion will fail if the plant is linked
        to supply costs, default supply suppliers, technical data, Abrams curves, or aggregate tests.
      operationId: deleteConcreteBatchingPlantById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Concrete batching plant deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /integrations/concretebatchingplants/by-external-id/{externalId}:
    get:
      tags: [ConcreteBatchingPlants]
      summary: Get a concrete batching plant by external ID
      description: Returns a single concrete batching plant identified by its external system reference.
      operationId: getConcreteBatchingPlantByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      responses:
        '200':
          description: Concrete batching plant found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteBatchingPlantResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ConcreteBatchingPlants]
      summary: Update a concrete batching plant by external ID
      description: Updates a single concrete batching plant identified by its external system reference.
      operationId: updateConcreteBatchingPlantByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConcreteBatchingPlantInput'
      responses:
        '200':
          description: Concrete batching plant updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteBatchingPlantResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [ConcreteBatchingPlants]
      summary: Delete a concrete batching plant by external ID
      description: Deletes a single concrete batching plant identified by its external system reference.
      operationId: deleteConcreteBatchingPlantByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      responses:
        '200':
          description: Concrete batching plant deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ── Concrete Recipe Families ──
  /integrations/concreterecipefamilies:
    get:
      tags: [ConcreteRecipeFamilies]
      summary: List all concrete recipe families
      description: |
        Returns all concrete recipe families, optionally filtered by update date range.
        If `end_updated_date` is not provided, defaults to the current timestamp.
        A date range is required to retrieve all records.
      operationId: listConcreteRecipeFamilies
      parameters:
        - $ref: '#/components/parameters/StartUpdatedDate'
        - $ref: '#/components/parameters/EndUpdatedDate'
      responses:
        '200':
          description: List of concrete recipe families
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteRecipeFamilyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /integrations/concreterecipefamilies/{id}:
    get:
      tags: [ConcreteRecipeFamilies]
      summary: Get a concrete recipe family by ID
      description: Returns a single concrete recipe family with its associated batching plant, product group, gravel, slump, and current version details.
      operationId: getConcreteRecipeFamilyById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Concrete recipe family found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteRecipeFamilyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /integrations/concreterecipefamilies/by-external-id/{externalId}:
    get:
      tags: [ConcreteRecipeFamilies]
      summary: Get a concrete recipe family by external ID
      description: Returns a single concrete recipe family identified by its external system reference.
      operationId: getConcreteRecipeFamilyByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      responses:
        '200':
          description: Concrete recipe family found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteRecipeFamilyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Concrete Recipe Family Versions ──
  /integrations/concreterecipefamilyversions/{id}:
    get:
      tags: [ConcreteRecipeFamilyVersions]
      summary: Get a concrete recipe family version by ID
      description: Returns a single concrete recipe family version with full nested characteristics and supply details.
      operationId: getConcreteRecipeFamilyVersionById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Concrete recipe family version found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteRecipeFamilyVersionPaginatedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /integrations/concreterecipefamilyversions/by-created-date/:
    get:
      tags: [ConcreteRecipeFamilyVersions]
      summary: List concrete recipe family versions by creation date
      description: |
        Returns paginated concrete recipe family versions filtered by creation date range.
        The `start_created_date` parameter is required. If `end_created_date` is not provided,
        defaults to the current timestamp.
      operationId: listConcreteRecipeFamilyVersionsByCreatedDate
      parameters:
        - name: start_created_date
          in: query
          required: true
          description: Start of the creation date range in ISO 8601 format
          schema:
            type: string
            format: date-time
          example: "2025-01-01T00:00:00"
        - name: end_created_date
          in: query
          required: false
          description: End of the creation date range in ISO 8601 format; defaults to current timestamp if omitted
          schema:
            type: string
            format: date-time
          example: "2025-12-31T23:59:59"
      responses:
        '200':
          description: Paginated list of concrete recipe family versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteRecipeFamilyVersionPaginatedResponse'
        '401':
