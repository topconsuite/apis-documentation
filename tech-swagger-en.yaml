components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token obtained from the token generation endpoint (single-tenant environments)
    SubscriptionKey:
      type: apiKey
      in: header
      name: Ocp-Apim-Subscription-Key
      description: API subscription key provided by Topcon for multi-tenant environments

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: Internal UUID of the resource
      schema:
        type: string
        format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6

    ExternalId:
      name: externalId
      in: path
      required: true
      description: External system reference identifier used to link records between systems
      schema:
        type: string
        maxLength: 100
      example: EXT-001

    StartUpdatedDate:
      name: start_updated_date
      in: query
      required: false
      description: Start of the update date filter range in ISO 8601 format (`YYYY-MM-DDThh:mm:ss`)
      schema:
        type: string
        format: date-time
      example: "2025-01-01T00:00:00"

    EndUpdatedDate:
      name: end_updated_date
      in: query
      required: false
      description: End of the update date filter range in ISO 8601 format; defaults to the current timestamp if omitted
      schema:
        type: string
        format: date-time
      example: "2025-12-31T23:59:59"

  responses:
    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            message: Validation failed
            errorCode: "400"
            notifications:
              - "name: Maximum 50 characters"

    Unauthorized:
      description: Authentication credentials are missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            message: Unauthorized access
            errorCode: "401"

    Forbidden:
      description: The authenticated user does not have permission to perform this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            message: Insufficient permissions
            errorCode: "403"

    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            message: Resource not found
            errorCode: "404"

    Conflict:
      description: The request conflicts with the current state of the resource (e.g., duplicate unique field or resource in use)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            message: External ID already exists
            errorCode: "409"

  schemas:
    # ── Base Envelope ──
    BaseResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, alert, error]
          description: Status of the executed process
          example: success
        message:
          type: string
          description: Human-readable message regarding the result of the process
          example: Operation completed successfully

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, alert, error]
          description: Status of the executed process
          example: error
        message:
          type: string
          description: Human-readable message regarding the error
          example: Validation failed
        errorCode:
          type: string
          description: Machine-readable error code for programmatic handling
          example: "1.4.1"
        notifications:
          type: array
          items:
            type: string
          description: List of detailed validation error messages
          example: ["name: Maximum 50 characters"]

    # ── Authentication ──
    TokenRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: Admin user login email address
          example: admin@company.com
        password:
          type: string
          format: password
          description: Admin user login password
          example: securePassword123

    TokenUpdateRequest:
      type: object
      required: [email, password, active]
      properties:
        email:
          type: string
          format: email
          description: Email of the user who originally created the token
          example: admin@company.com
        password:
          type: string
          format: password
          description: Password of the user who originally created the token
          example: securePassword123
        active:
          type: boolean
          description: Set to **false** to revoke the token or **true** to reactivate it
          example: false

    TokenResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: object
              properties:
                token:
                  type: string
                  description: Generated Bearer token for API authentication
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0.dozjgNryP4J3jVmNHl0w5N_XgL0n3I9PlFUP0THsR8U

    # ── Classification Supply Type ──
    SupplyGroup:
      type: string
      enum: [ADDITIONS, ADDITIVE, BINDER, COARSE_AGGREGATE, FINE_AGGREGATE, WATER]
      description: Material group classification for the supply
      example: BINDER

    ClassificationSupplyTypeInput:
      type: object
      required: [name, group, externalId]
      properties:
        name:
          type: string
          maxLength: 50
          description: Name of the classification supply type
          example: Portland Cement CP-V
        group:
          $ref: '#/components/schemas/SupplyGroup'
        externalId:
          type: string
          maxLength: 100
          description: Unique external system reference for linking between systems (required on creation only)
          example: EXT-CST-001
        active:
          type: boolean
          description: Whether the classification supply type is active
          default: true
          example: true

    ClassificationSupplyType:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique internal identifier of the classification supply type
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        name:
          type: string
          maxLength: 50
          description: Name of the classification supply type
          example: Portland Cement CP-V
        group:
          $ref: '#/components/schemas/SupplyGroup'
        active:
          type: boolean
          description: Whether the classification supply type is active
          example: true
        externalId:
          type: string
          maxLength: 100
          description: External system reference identifier
          example: EXT-CST-001
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the record was created
          example: "2025-01-15T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the record was last updated
          example: "2025-01-15T10:30:00"

    ClassificationSupplyTypeResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/ClassificationSupplyType'

    ClassificationSupplyTypeListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: '#/components/schemas/ClassificationSupplyType'

    # ── Concrete Batching Plant ──
    ConcreteBatchingPlantInput:
      type: object
      required: [name, abbreviation, code, externalId]
      properties:
        name:
          type: string
          maxLength: 50
          description: Name of the concrete batching plant
          example: Central Plant Alpha
        abbreviation:
          type: string
          maxLength: 3
          description: Short abbreviation code for the batching plant (must be unique)
          example: CPA
        code:
          type: string
          maxLength: 10
          description: Unique code identifier for the batching plant
          example: PLANT-001
        externalId:
          type: string
          maxLength: 100
          description: Unique external system reference (required on creation only)
          example: EXT-CBP-001
        active:
          type: boolean
          description: Whether the batching plant is active
          default: true
          example: true

    ConcreteBatchingPlant:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique internal identifier of the concrete batching plant
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        name:
          type: string
          maxLength: 50
          description: Name of the concrete batching plant
          example: Central Plant Alpha
        abbreviation:
          type: string
          maxLength: 3
