            type: string
          description: List of validation messages if applicable

    # ── Concrete Recipe ──
    MeasureUnitTypeCharacteristic:
      type: string
      enum: [GPA, KGM_3, MPA, PERCENTAGE]
      description: Measurement unit characteristic used for concrete characteristics
      example: MPA

    ConcreteCharacteristicsType:
      type: object
      properties:
        externalId:
          type: string
          maxLength: 100
          description: External system reference for the characteristics type
          example: EXT-CCT-001
        abbreviation:
          type: string
          maxLength: 30
          description: Abbreviation of the characteristics type
          example: FCK
        active:
          type: boolean
          description: Whether the characteristics type is active
          example: true
        fixed:
          type: boolean
          description: Whether this is a system-defined characteristics type
          example: true
        mask:
          type: string
          maxLength: 50
          description: Display mask for the characteristic value
          example: "###.##"
        description:
          type: string
          maxLength: 130
          description: Full description of the characteristics type
          example: Characteristic compressive strength
        measureUnitTypeCharacteristic:
          $ref: '#/components/schemas/MeasureUnitTypeCharacteristic'

    ConcreteRecipeUpdateInput:
      type: object
      required: [externalId]
      properties:
        externalId:
          type: string
          maxLength: 100
          description: Unique external system reference to assign to the concrete recipe
          example: EXT-CR-001

    ConcreteRecipe:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique internal identifier of the concrete recipe
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        externalId:
          type: string
          maxLength: 100
          description: External system reference identifier
          example: EXT-CR-001
        numeration:
          type: integer
          description: System-generated sequential number for the recipe
          example: 42
        specification:
          type: string
          maxLength: 130
          description: Technical specification string of the concrete recipe
          example: "FCK 25 MPA"
        description:
          type: string
          maxLength: 130
          description: Human-readable description of the concrete recipe
          example: Concrete 25 MPa for structural use
        concreteRecipeCharacteristicValue:
          type: number
          format: double
          description: Primary characteristic value of the recipe (e.g., compressive strength in MPa)
          example: 25.0
        active:
          type: boolean
          description: Whether the recipe is active
          example: true
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the record was created
          example: "2025-01-15T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the record was last updated
          example: "2025-01-15T10:30:00"
        gravel:
          $ref: '#/components/schemas/Gravel'
        slump:
          $ref: '#/components/schemas/Slump'
        slumpInitial:
          $ref: '#/components/schemas/Slump'
        productGroup:
          $ref: '#/components/schemas/ProductGroup'
        concreteCharacteristicsType:
          $ref: '#/components/schemas/ConcreteCharacteristicsType'

    ConcreteRecipeResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/ConcreteRecipe'

    ConcreteRecipeListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: '#/components/schemas/ConcreteRecipe'
