    ConcreteRecipeFamilyListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: '#/components/schemas/ConcreteRecipeFamily'

    # ── Versão de Família de Receita de Concreto ──
    VersionStatus:
      type: string
      enum: [IN_EXPERIMENT, ACTIVE, FUTURE_ACTIVE, INACTIVE]
      description: Status do ciclo de vida da versão da família de receita
      example: ACTIVE

    DispersionInputData:
      type: string
      enum: [COEFFICIENT_OF_VARIATION, STANDARD_DEVIATION]
      description: Método de dados de dispersão de entrada utilizado nos cálculos
      example: STANDARD_DEVIATION

    InputDataMethod:
      type: string
      enum: [TECHNICAL_DATA, MANUALLY]
      description: Método utilizado para inserir dados da receita
      example: TECHNICAL_DATA

    ConcreteRecipeFamilyVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identificador interno único da versão da família de receita
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        externalId:
          type: string
          maxLength: 100
          description: Identificador de referência do sistema externo
          example: EXT-CRFV-001
        statusDate:
          type: string
          format: date
          description: Data em que o status atual foi definido
          example: "2025-01-15"
        createdAt:
          type: string
          format: date-time
          description: Data e hora em que o registro foi criado
          example: "2025-01-15T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: Data e hora da última atualização do registro
          example: "2025-01-15T10:30:00"
        note:
          type: string
          description: Observações opcionais sobre esta versão
          example: Versão inicial para o 1º trimestre de 2025
        version:
          type: integer
          description: Número de versão sequencial dentro da família de receita
          example: 1
        status:
          $ref: '#/components/schemas/VersionStatus'
        defaultDispersionInputData:
          $ref: '#/components/schemas/DispersionInputData'
        inputDataMethod:
          $ref: '#/components/schemas/InputDataMethod'
        defaultMortarContent:
          type: number
          format: double
          description: Percentual de teor de argamassa padrão
          example: 52.5
        waterContent:
          type: number
          format: double
          description: Teor de água na receita (litros por m³)
          example: 190.0
        defaultIncorporatedAir:
          type: number
          format: double
          description: Percentual de ar incorporado padrão
          example: 1.5
        defaultVolume:
          type: number
          format: double
          description: Volume de referência padrão (m³)
          example: 1000.0
        defaultDispersionValue:
          type: number
          format: double
          description: Valor de dispersão padrão para cálculos estatísticos
          example: 4.0
        mortarContentStep:
          type: number
          format: double
          description: Incremento de ajuste do teor de argamassa
          example: 0.5
        waterStep:
          type: number
          format: double
          description: Incremento de ajuste do teor de água
          example: 5.0
        waterCementRatioStepReference:
          type: number
          format: double
          description: Incremento de referência para a relação água/cimento
          example: 0.05
        costUpdateDate:
          type: string
          format: date
          description: Data da última atualização das informações de custo para esta versão
          example: "2025-02-01"
        concreteRecipeFamilyId:
          type: string
          format: uuid
          description: UUID da família de receita pai
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        concreteRecipeFamily:
          $ref: '#/components/schemas/ConcreteRecipeFamily'

    ConcreteRecipeFamilyVersionPaginatedResponse:
      type: object
      properties:
        page:
          type: integer
          description: Número da página atual (iniciando em 1)
          example: 1
        perPage:
          type: integer
          description: Número de registros por página
          example: 20
        pageCount:
          type: integer
          description: Número total de páginas disponíveis
          example: 5
        totalCount:
          type: integer
          description: Número total de registros correspondentes à consulta
          example: 97
        result:
          type: array
          items:
            $ref: '#/components/schemas/ConcreteRecipeFamilyVersion'
        status:
          type: string
          enum: [success, alert, error]
          description: Status do processo executado
          example: success
        message:
          type: string
          description: Mensagem legível sobre o resultado
          example: Registros recuperados com sucesso
        errorCode:
          type: string
          description: Código de erro legível por máquina, se aplicável
        notifications:
          type: array
          items:
            type: string
          description: Lista de mensagens de validação, se aplicável

