openapi: 3.0.3
info:
  title: API de Integração Topcon Tech
  version: 1.0.0
  description: |
    A **API de Integração Topcon Tech** fornece endpoints para gerenciamento de recursos de tecnologia de concreto, incluindo insumos, fornecedores, centrais de dosagem, receitas de concreto e entidades relacionadas. Esta API é projetada para integração sistema-a-sistema, permitindo que sistemas ERP e de gestão externos sincronizem dados mestres com a plataforma Topcon Suite.

    A autenticação é realizada via **tokens Bearer JWT** (single-tenant) ou **chaves de assinatura da API** (multi-tenant). Todas as respostas seguem um envelope padrão com os campos `status`, `message`, `result` e `errorCode` (opcional).
  contact:
    name: Suporte Topcon Suite
    url: https://topconsuite.io
servers:
  - url: https://api.topconsuite.io/tech-hml
    description: Ambiente Beta (HML) multi-tenant
  - url: https://{client}-api.topconsuite.app/tech
    description: Ambiente single-tenant do cliente
    variables:
      client:
        default: demo
        description: Prefixo de subdomínio específico do cliente

tags:
  - name: Authentication
    description: Geração e gerenciamento de tokens para ambientes single-tenant
    x-displayName: Autenticação
  - name: ClassificationSupplyTypes
    description: Gerenciar tipos de classificação utilizados para categorizar insumos por grupo de material
    x-displayName: Tipos de Classificação de Insumo
  - name: ConcreteBatchingPlants
    description: Gerenciar o cadastro de centrais de dosagem de concreto
    x-displayName: Centrais de Dosagem
  - name: ConcreteRecipeFamilies
    description: Consultar e atualizar registros de famílias de receita de concreto
    x-displayName: Famílias de Receita de Concreto
  - name: ConcreteRecipeFamilyVersions
    description: Consultar dados de versões de famílias de receita de concreto, incluindo características e detalhes de insumos
    x-displayName: Versões de Família de Receita de Concreto
  - name: ConcreteRecipes
    description: Consultar e atualizar registros de receitas de concreto
    x-displayName: Receitas de Concreto
  - name: CostSupplies
    description: Gerenciar registros de custo de insumos, incluindo preço, frete e fatores de conversão
    x-displayName: Custos de Insumo
  - name: IdentificationDocumentTypes
    description: Consultar tipos de documentos de identificação como CPF e CNPJ
    x-displayName: Tipos de Documento de Identificação
  - name: MeasureUnitTypes
    description: Gerenciar tipos de unidades de medida utilizadas na plataforma
    x-displayName: Tipos de Unidade de Medida
  - name: Suppliers
    description: Gerenciar o cadastro de fornecedores com identificação documental
    x-displayName: Fornecedores
  - name: Supplies
    description: Gerenciar o cadastro de insumos (materiais) utilizados na produção de concreto
    x-displayName: Insumos
  - name: TechnicalDataSupplies
    description: Gerenciar dados técnicos de insumos, incluindo massa específica e massa unitária por central de dosagem
    x-displayName: Dados Técnicos de Insumo

x-tagGroups:
  - name: Autenticação
    tags:
      - Authentication
  - name: Recursos Principais
    tags:
      - Supplies
      - Suppliers
      - CostSupplies
      - TechnicalDataSupplies
  - name: Classificação e Unidades
    tags:
      - ClassificationSupplyTypes
      - MeasureUnitTypes
      - IdentificationDocumentTypes
  - name: Produção de Concreto
    tags:
      - ConcreteBatchingPlants
      - ConcreteRecipeFamilies
      - ConcreteRecipeFamilyVersions
      - ConcreteRecipes

security:
  - BearerAuth: []
  - SubscriptionKey: []

paths:
  # ── Autenticação ──
  /integrationtokens/integration:
    post:
      tags: [Authentication]
      summary: Gerar um novo token de integração
      description: |
        Gera um novo token Bearer para autenticação na API em ambientes **single-tenant**.
        Apenas usuários administradores podem gerar tokens de integração públicos. Para ambientes multi-tenant,
        utilize o cabeçalho `Ocp-Apim-Subscription-Key`.
      operationId: generateToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
            example:
              email: admin@company.com
              password: securePassword123
      responses:
        '200':
          description: Token gerado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                status: success
                message: Token gerado com sucesso
                result:
                  token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST https://api.topconsuite.io/tech-hml/integrationtokens/integration \
              -H "Content-Type: application/json" \
              -d '{"email":"admin@company.com","password":"securePassword123"}'
        - lang: javascript
          source: |
            const response = await fetch('https://api.topconsuite.io/tech-hml/integrationtokens/integration', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                email: 'admin@company.com',
                password: 'securePassword123'
              })
            });

            const data = await response.json();
        - lang: csharp
          source: |
            using System.Net.Http;
            using System.Net.Http.Json;

            using var httpClient = new HttpClient();

            var response = await httpClient.PostAsJsonAsync(
                "https://api.topconsuite.io/tech-hml/integrationtokens/integration",
                new
                {
                    email = "admin@company.com",
                    password = "securePassword123"
                });

            var payload = await response.Content.ReadAsStringAsync();
        - lang: python
          source: |
            import requests

            response = requests.post(
                'https://api.topconsuite.io/tech-hml/integrationtokens/integration',
                json={
                    'email': 'admin@company.com',
                    'password': 'securePassword123'
                }
            )

            data = response.json()

  /integrationtokens/integration/{token}:
    patch:
      tags: [Authentication]
      summary: Revogar ou ativar um token existente
      description: |
        Atualiza o status de um token de integração existente. Defina `active` como **false** para revogar
        ou **true** para reativar. A requisição deve incluir as credenciais do usuário que
        criou o token originalmente.
      operationId: updateToken
      security: []
      parameters:
        - name: token
          in: path
          required: true
          description: String do token a ser revogado ou ativado
          schema:
            type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenUpdateRequest'
            example:
              email: admin@company.com
              password: securePassword123
              active: false
      responses:
        '200':
          description: Status do token atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
              example:
                status: success
                message: Token revogado com sucesso
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Tipos de Classificação de Insumo ──
  /integrations/classificationsupplytypes:
    post:
      tags: [ClassificationSupplyTypes]
      summary: Criar um novo tipo de classificação de insumo
      description: |
        Cria um único tipo de classificação de insumo. O campo `externalId` deve ser único
        entre todos os tipos de classificação e é utilizado para vincular registros entre sistemas externos.
      operationId: createClassificationSupplyType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassificationSupplyTypeInput'
            example:
              name: Cimento Portland CP-V
              group: BINDER
              externalId: EXT-CST-001
              active: true
      responses:
        '201':
          description: Tipo de classificação de insumo criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationSupplyTypeResponse'
              example:
                status: success
                message: Registro criado com sucesso
                result:
                  id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  name: Cimento Portland CP-V
                  group: BINDER
                  active: true
                  externalId: EXT-CST-001
                  createdAt: "2025-01-15T10:30:00"
                  updatedAt: "2025-01-15T10:30:00"
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST https://api.topconsuite.io/tech-hml/integrations/classificationsupplytypes \
              -H "Authorization: Bearer <token>" \
              -H "Ocp-Apim-Subscription-Key: <key>" \
              -H "Content-Type: application/json" \
              -d '{"name":"Cimento Portland CP-V","group":"BINDER","externalId":"EXT-CST-001","active":true}'
        - lang: javascript
          source: |
            const response = await fetch('https://api.topconsuite.io/tech-hml/integrations/classificationsupplytypes', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer <token>',
                'Ocp-Apim-Subscription-Key': '<key>',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                name: 'Cimento Portland CP-V',
                group: 'BINDER',
                externalId: 'EXT-CST-001',
                active: true
              })
            });

            const data = await response.json();
        - lang: csharp
          source: |
            using System.Net.Http;
            using System.Net.Http.Headers;
            using System.Net.Http.Json;

            using var httpClient = new HttpClient();
            httpClient.DefaultRequestHeaders.Authorization = new AuthenticationHeaderValue("Bearer", "<token>");
            httpClient.DefaultRequestHeaders.Add("Ocp-Apim-Subscription-Key", "<key>");

            var response = await httpClient.PostAsJsonAsync(
                "https://api.topconsuite.io/tech-hml/integrations/classificationsupplytypes",
                new
                {
                    name = "Cimento Portland CP-V",
                    group = "BINDER",
                    externalId = "EXT-CST-001",
                    active = true
                });

            var payload = await response.Content.ReadAsStringAsync();
        - lang: python
          source: |
            import requests

            response = requests.post(
                'https://api.topconsuite.io/tech-hml/integrations/classificationsupplytypes',
                headers={
                    'Authorization': 'Bearer <token>',
                    'Ocp-Apim-Subscription-Key': '<key>'
                },
                json={
                    'name': 'Cimento Portland CP-V',
                    'group': 'BINDER',
                    'externalId': 'EXT-CST-001',
                    'active': True
                }
            )

            data = response.json()
    get:
      tags: [ClassificationSupplyTypes]
      summary: Listar todos os tipos de classificação de insumo
      description: |
        Retorna todos os tipos de classificação de insumo, opcionalmente filtrados por intervalo de data de atualização.
        Se nenhuma data for informada, todos os registros são retornados.
      operationId: listClassificationSupplyTypes
      parameters:
        - $ref: '#/components/parameters/StartUpdatedDate'
        - $ref: '#/components/parameters/EndUpdatedDate'
      responses:
        '200':
          description: Lista de tipos de classificação de insumo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationSupplyTypeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /integrations/classificationsupplytypes/{id}:
    get:
      tags: [ClassificationSupplyTypes]
      summary: Obter um tipo de classificação de insumo por ID
      description: Retorna um único tipo de classificação de insumo identificado pelo seu UUID interno.
      operationId: getClassificationSupplyTypeById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Tipo de classificação de insumo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationSupplyTypeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ClassificationSupplyTypes]
      summary: Atualizar um tipo de classificação de insumo por ID
      description: Atualiza um único tipo de classificação de insumo identificado pelo seu UUID interno.
      operationId: updateClassificationSupplyTypeById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassificationSupplyTypeInput'
      responses:
        '200':
          description: Tipo de classificação de insumo atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationSupplyTypeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [ClassificationSupplyTypes]
      summary: Excluir um tipo de classificação de insumo por ID
      description: |
        Exclui um único tipo de classificação de insumo. A exclusão falhará se o registro
        estiver vinculado a insumos ou custos de insumos existentes.
      operationId: deleteClassificationSupplyTypeById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Tipo de classificação de insumo excluído com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /integrations/classificationsupplytypes/by-external-id/{externalId}:
    get:
      tags: [ClassificationSupplyTypes]
      summary: Obter um tipo de classificação de insumo por ID externo
      description: Retorna um único tipo de classificação de insumo identificado pela sua referência no sistema externo.
      operationId: getClassificationSupplyTypeByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      responses:
        '200':
          description: Tipo de classificação de insumo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationSupplyTypeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ClassificationSupplyTypes]
      summary: Atualizar um tipo de classificação de insumo por ID externo
      description: Atualiza um único tipo de classificação de insumo identificado pela sua referência no sistema externo.
      operationId: updateClassificationSupplyTypeByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassificationSupplyTypeInput'
      responses:
        '200':
          description: Tipo de classificação de insumo atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationSupplyTypeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [ClassificationSupplyTypes]
      summary: Excluir um tipo de classificação de insumo por ID externo
      description: Exclui um único tipo de classificação de insumo identificado pela sua referência no sistema externo.
      operationId: deleteClassificationSupplyTypeByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      responses:
        '200':
          description: Tipo de classificação de insumo excluído com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ── Centrais de Dosagem ──
  /integrations/concretebatchingplants:
    post:
      tags: [ConcreteBatchingPlants]
      summary: Criar uma nova central de dosagem
      description: |
        Cria uma única central de dosagem de concreto. Os campos `code`, `abbreviation` e `externalId`
        devem ser únicos.
      operationId: createConcreteBatchingPlant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConcreteBatchingPlantInput'
            example:
              name: Central Alpha
              abbreviation: CPA
              code: PLANT-001
              externalId: EXT-CBP-001
              active: true
      responses:
        '201':
          description: Central de dosagem criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteBatchingPlantResponse'
              example:
                status: success
                message: Registro criado com sucesso
                result:
                  id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                  name: Central Alpha
                  abbreviation: CPA
                  code: PLANT-001
                  active: true
                  externalId: EXT-CBP-001
                  createdAt: "2025-01-15T10:30:00"
                  updatedAt: "2025-01-15T10:30:00"
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST https://api.topconsuite.io/tech-hml/integrations/concretebatchingplants \
              -H "Authorization: Bearer <token>" \
              -H "Ocp-Apim-Subscription-Key: <key>" \
              -H "Content-Type: application/json" \
              -d '{"name":"Central Plant Alpha","abbreviation":"CPA","code":"PLANT-001","externalId":"EXT-CBP-001","active":true}'
        - lang: javascript
          source: |
            const response = await fetch('https://api.topconsuite.io/tech-hml/integrations/concretebatchingplants', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer <token>',
                'Ocp-Apim-Subscription-Key': '<key>',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                name: 'Central Plant Alpha',
                abbreviation: 'CPA',
                code: 'PLANT-001',
                externalId: 'EXT-CBP-001',
                active: true
              })
            });
          
            const data = await response.json();
        - lang: csharp
          source: |
            using System.Net.Http;
            using System.Net.Http.Headers;
            using System.Net.Http.Json;
          
            using var httpClient = new HttpClient();
            httpClient.DefaultRequestHeaders.Authorization = new AuthenticationHeaderValue("Bearer", "<token>");
            httpClient.DefaultRequestHeaders.Add("Ocp-Apim-Subscription-Key", "<key>");
          
            var response = await httpClient.PostAsJsonAsync(
                "https://api.topconsuite.io/tech-hml/integrations/concretebatchingplants",
                new
                {
                    name = "Central Plant Alpha",
                    abbreviation = "CPA",
                    code = "PLANT-001",
                    externalId = "EXT-CBP-001",
                    active = true
                });
          
            var payload = await response.Content.ReadAsStringAsync();
        - lang: python
          source: |
            import requests
          
            response = requests.post(
                'https://api.topconsuite.io/tech-hml/integrations/concretebatchingplants',
                headers={
                    'Authorization': 'Bearer <token>',
                    'Ocp-Apim-Subscription-Key': '<key>'
                },
                json={
                    'name': 'Central Plant Alpha',
                    'abbreviation': 'CPA',
                    'code': 'PLANT-001',
                    'externalId': 'EXT-CBP-001',
                    'active': True
                }
            )
          
            data = response.json()
    get:
      tags: [ConcreteBatchingPlants]
      summary: Listar todas as centrais de dosagem
      description: |
        Retorna todas as centrais de dosagem de concreto, opcionalmente filtradas por intervalo de data de atualização.
        Se nenhuma data for informada, todos os registros são retornados.
      operationId: listConcreteBatchingPlants
      parameters:
        - $ref: '#/components/parameters/StartUpdatedDate'
        - $ref: '#/components/parameters/EndUpdatedDate'
      responses:
        '200':
          description: Lista de centrais de dosagem
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteBatchingPlantListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /integrations/concretebatchingplants/{id}:
    get:
      tags: [ConcreteBatchingPlants]
      summary: Obter uma central de dosagem por ID
      description: Retorna uma única central de dosagem identificada pelo seu UUID interno.
      operationId: getConcreteBatchingPlantById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Central de dosagem encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteBatchingPlantResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ConcreteBatchingPlants]
      summary: Atualizar uma central de dosagem por ID
      description: Atualiza uma única central de dosagem identificada pelo seu UUID interno.
      operationId: updateConcreteBatchingPlantById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConcreteBatchingPlantInput'
      responses:
        '200':
          description: Central de dosagem atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteBatchingPlantResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [ConcreteBatchingPlants]
      summary: Excluir uma central de dosagem por ID
      description: |
        Exclui uma única central de dosagem. A exclusão falhará se a central estiver vinculada
        a custos de insumo, fornecedores padrão, dados técnicos, curvas de Abrams ou ensaios de agregados.
      operationId: deleteConcreteBatchingPlantById
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Central de dosagem excluída com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /integrations/concretebatchingplants/by-external-id/{externalId}:
    get:
      tags: [ConcreteBatchingPlants]
      summary: Obter uma central de dosagem por ID externo
      description: Retorna uma única central de dosagem identificada pela sua referência no sistema externo.
      operationId: getConcreteBatchingPlantByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      responses:
        '200':
          description: Central de dosagem encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteBatchingPlantResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ConcreteBatchingPlants]
      summary: Atualizar uma central de dosagem por ID externo
      description: Atualiza uma única central de dosagem identificada pela sua referência no sistema externo.
      operationId: updateConcreteBatchingPlantByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConcreteBatchingPlantInput'
      responses:
        '200':
          description: Central de dosagem atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConcreteBatchingPlantResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
