      tags: [TechnicalDataSupplies]
      summary: Atualizar um registro de dado técnico de insumo por ID externo
      description: Atualiza um único registro de dado técnico de insumo identificado pela sua referência no sistema externo.
      operationId: updateTechnicalDataSupplyByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TechnicalDataSupplyInput'
      responses:
        '200':
          description: Registro de dado técnico de insumo atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TechnicalDataSupplyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [TechnicalDataSupplies]
      summary: Excluir um registro de dado técnico de insumo por ID externo
      description: Exclui um único registro de dado técnico de insumo identificado pela sua referência no sistema externo.
      operationId: deleteTechnicalDataSupplyByExternalId
      parameters:
        - $ref: '#/components/parameters/ExternalId'
      responses:
        '200':
          description: Registro de dado técnico de insumo excluído com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token Bearer obtido no endpoint de geração de token (ambientes single-tenant)
    SubscriptionKey:
      type: apiKey
      in: header
      name: Ocp-Apim-Subscription-Key
      description: Chave de assinatura da API fornecida pela Topcon para ambientes multi-tenant

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: UUID interno do recurso
      schema:
        type: string
        format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6

    ExternalId:
      name: externalId
      in: path
      required: true
      description: Identificador de referência do sistema externo utilizado para vincular registros entre sistemas
      schema:
        type: string
        maxLength: 100
      example: EXT-001

    StartUpdatedDate:
      name: start_updated_date
      in: query
      required: false
      description: Início do intervalo de filtro por data de atualização no formato ISO 8601 (`YYYY-MM-DDThh:mm:ss`)
      schema:
        type: string
        format: date-time
      example: "2025-01-01T00:00:00"

    EndUpdatedDate:
      name: end_updated_date
      in: query
      required: false
      description: Fim do intervalo de filtro por data de atualização no formato ISO 8601; padrão é a data/hora atual se omitido
      schema:
        type: string
        format: date-time
      example: "2025-12-31T23:59:59"

  responses:
    ValidationError:
      description: O corpo da requisição falhou na validação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            message: Falha na validação
            errorCode: "400"
            notifications:
              - "name: Máximo de 50 caracteres"

    Unauthorized:
      description: As credenciais de autenticação estão ausentes ou são inválidas
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            message: Acesso não autorizado
            errorCode: "401"

    Forbidden:
      description: O usuário autenticado não tem permissão para realizar esta ação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            message: Permissões insuficientes
            errorCode: "403"

    NotFound:
      description: O recurso solicitado não foi encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            message: Recurso não encontrado
            errorCode: "404"

    Conflict:
      description: 'A requisição conflita com o estado atual do recurso (ex.: campo único duplicado ou recurso em uso)'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: error
            message: ID externo já existe
            errorCode: "409"

  schemas:
    # ── Envelope Base ──
    BaseResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, alert, error]
          description: Status do processo executado
          example: success
        message:
          type: string
          description: Mensagem legível sobre o resultado do processo
          example: Operação concluída com sucesso

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, alert, error]
          description: Status do processo executado
          example: error
        message:
          type: string
          description: Mensagem legível sobre o erro
          example: Falha na validação
        errorCode:
          type: string
          description: Código de erro legível por máquina para tratamento programático
          example: "1.4.1"
        notifications:
          type: array
          items:
            type: string
          description: Lista detalhada de mensagens de erro de validação
          example: ["name: Máximo de 50 caracteres"]

    # ── Autenticação ──
    TokenRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: E-mail de login do usuário administrador
          example: admin@company.com
        password:
          type: string
          format: password
          description: Senha de login do usuário administrador
          example: securePassword123

    TokenUpdateRequest:
      type: object
      required: [email, password, active]
      properties:
        email:
          type: string
          format: email
          description: E-mail do usuário que criou o token originalmente
          example: admin@company.com
        password:
          type: string
          format: password
          description: Senha do usuário que criou o token originalmente
          example: securePassword123
        active:
          type: boolean
          description: Defina como **false** para revogar o token ou **true** para reativá-lo
          example: false

    TokenResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: object
              properties:
                token:
                  type: string
                  description: Token Bearer gerado para autenticação na API
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0.dozjgNryP4J3jVmNHl0w5N_XgL0n3I9PlFUP0THsR8U

    # ── Tipo de Classificação de Insumo ──
    SupplyGroup:
      type: string
      enum: [ADDITIONS, ADDITIVE, BINDER, COARSE_AGGREGATE, FINE_AGGREGATE, WATER]
      description: Classificação de grupo de material do insumo
      example: BINDER

    ClassificationSupplyTypeInput:
      type: object
      required: [name, group, externalId]
      properties:
        name:
          type: string
          maxLength: 50
          description: Nome do tipo de classificação de insumo
          example: Cimento Portland CP-V
        group:
          $ref: '#/components/schemas/SupplyGroup'
        externalId:
          type: string
          maxLength: 100
          description: Referência única do sistema externo para vinculação entre sistemas (obrigatório apenas na criação)
          example: EXT-CST-001
        active:
          type: boolean
          description: Se o tipo de classificação de insumo está ativo
          default: true
          example: true

    ClassificationSupplyType:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identificador interno único do tipo de classificação de insumo
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        name:
          type: string
          maxLength: 50
          description: Nome do tipo de classificação de insumo
          example: Cimento Portland CP-V
        group:
          $ref: '#/components/schemas/SupplyGroup'
        active:
          type: boolean
          description: Se o tipo de classificação de insumo está ativo
          example: true
        externalId:
          type: string
          maxLength: 100
          description: Identificador de referência do sistema externo
          example: EXT-CST-001
        createdAt:
          type: string
          format: date-time
          description: Data e hora em que o registro foi criado
          example: "2025-01-15T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: Data e hora da última atualização do registro
          example: "2025-01-15T10:30:00"

    ClassificationSupplyTypeResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/ClassificationSupplyType'

    ClassificationSupplyTypeListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: '#/components/schemas/ClassificationSupplyType'

    # ── Central de Dosagem ──
    ConcreteBatchingPlantInput:
      type: object
      required: [name, abbreviation, code, externalId]
      properties:
        name:
          type: string
          maxLength: 50
          description: Nome da central de dosagem de concreto
          example: Central Alpha
        abbreviation:
          type: string
          maxLength: 3
          description: Código de abreviação curto da central de dosagem (deve ser único)
          example: CPA
        code:
          type: string
          maxLength: 10
          description: Código identificador único da central de dosagem
          example: PLANT-001
        externalId:
          type: string
          maxLength: 100
          description: Referência única do sistema externo (obrigatório apenas na criação)
          example: EXT-CBP-001
        active:
          type: boolean
          description: Se a central de dosagem está ativa
          default: true
          example: true

    ConcreteBatchingPlant:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identificador interno único da central de dosagem
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        name:
          type: string
          maxLength: 50
          description: Nome da central de dosagem de concreto
          example: Central Alpha
        abbreviation:
          type: string
          maxLength: 3
          description: Código de abreviação curto
          example: CPA
        code:
          type: string
          maxLength: 10
          description: Código identificador único
          example: PLANT-001
        active:
          type: boolean
          description: Se a central de dosagem está ativa
          example: true
        externalId:
          type: string
          maxLength: 100
          description: Identificador de referência do sistema externo
          example: EXT-CBP-001
        createdAt:
          type: string
          format: date-time
          description: Data e hora em que o registro foi criado
          example: "2025-01-15T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: Data e hora da última atualização do registro
          example: "2025-01-15T10:30:00"

    ConcreteBatchingPlantResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/ConcreteBatchingPlant'

    ConcreteBatchingPlantListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: '#/components/schemas/ConcreteBatchingPlant'

    # ── Tipo de Documento de Identificação ──
    IdentificationDocumentType:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identificador interno único do tipo de documento de identificação
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        name:
          type: string
          maxLength: 50
          description: 'Nome curto do tipo de documento (ex.: CPF, CNPJ)'
          example: CNPJ
        description:
          type: string
          maxLength: 150
          description: Descrição completa do tipo de documento
          example: Cadastro Nacional da Pessoa Jurídica
        mask:
          type: string
          maxLength: 100
          description: Padrão de máscara de entrada para o número do documento
          example: "##.###.###/####-##"

    IdentificationDocumentTypeResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/IdentificationDocumentType'

    IdentificationDocumentTypeListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: '#/components/schemas/IdentificationDocumentType'

    # ── Tipo de Unidade de Medida ──
    MeasureUnitTypeInput:
      type: object
      required: [description, abbreviation, externalId]
      properties:
        description:
          type: string
          maxLength: 50
          description: Descrição completa do tipo de unidade de medida
          example: Quilograma
        abbreviation:
          type: string
          maxLength: 3
          description: Abreviação curta da unidade (deve ser única)
          example: KG
        externalId:
          type: string
          maxLength: 100
          description: Referência única do sistema externo (obrigatório apenas na criação)
          example: EXT-MUT-KG
        active:
          type: boolean
          description: Se o tipo de unidade de medida está ativo
          default: true
          example: true

    MeasureUnitType:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identificador interno único do tipo de unidade de medida
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        description:
          type: string
          maxLength: 50
          description: Descrição completa do tipo de unidade de medida
          example: Quilograma
        abbreviation:
          type: string
          maxLength: 3
          description: Abreviação curta da unidade
          example: KG
        active:
          type: boolean
          description: Se o tipo de unidade de medida está ativo
          example: true
        fixed:
          type: boolean
          description: Se este é um tipo de unidade definido pelo sistema (não editável)
          example: false
        externalId:
          type: string
          maxLength: 100
          description: Identificador de referência do sistema externo
          example: EXT-MUT-KG
        createdAt:
          type: string
          format: date-time
          description: Data e hora em que o registro foi criado
          example: "2025-01-15T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: Data e hora da última atualização do registro
          example: "2025-01-15T10:30:00"

    MeasureUnitTypeResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/MeasureUnitType'

    MeasureUnitTypeListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: '#/components/schemas/MeasureUnitType'

    # ── Fornecedor ──
    SupplierInput:
      type: object
      required: [name, company, documentNumber, externalId, identificationDocumentTypeId]
      properties:
        name:
          type: string
          maxLength: 50
          description: Nome fantasia do fornecedor
          example: Cimento Nacional S.A.
        company:
          type: string
          maxLength: 100
          description: Razão social completa do fornecedor
          example: Cimento Nacional S.A.
        documentNumber:
          type: string
          maxLength: 100
          description: 'Número do documento de identificação do fornecedor (ex.: CNPJ ou CPF)'
          example: "12345678000199"
        externalId:
          type: string
          maxLength: 100
          description: Referência única do sistema externo (obrigatório apenas na criação)
          example: EXT-SUPPLIER-001
        identificationDocumentTypeId:
          type: string
          format: uuid
          description: 'UUID do tipo de documento de identificação (ex.: CPF ou CNPJ)'
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        active:
          type: boolean
          description: Se o fornecedor está ativo
          default: true
          example: true

    Supplier:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identificador interno único do fornecedor
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        name:
          type: string
          maxLength: 50
          description: Nome fantasia do fornecedor
          example: Cimento Nacional S.A.
        company:
          type: string
          maxLength: 100
          description: Razão social completa do fornecedor
          example: Cimento Nacional S.A.
        documentNumber:
          type: string
          maxLength: 100
          description: Número do documento de identificação do fornecedor
          example: "12345678000199"
        active:
          type: boolean
          description: Se o fornecedor está ativo
          example: true
        externalId:
          type: string
          maxLength: 130
          description: Identificador de referência do sistema externo
          example: EXT-SUPPLIER-001
        identificationDocumentType:
          $ref: '#/components/schemas/IdentificationDocumentType'
        createdAt:
          type: string
          format: date-time
          description: Data e hora em que o registro foi criado
          example: "2025-01-15T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: Data e hora da última atualização do registro
          example: "2025-01-15T10:30:00"

    SupplierResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/Supplier'

    SupplierListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: '#/components/schemas/Supplier'

    # ── Insumo ──
    SupplyInput:
      type: object
      required: [name, abbreviation, group, externalId]
      properties:
        name:
          type: string
          maxLength: 50
          description: Nome do material de insumo
          example: Areia Tipo A
        abbreviation:
          type: string
          maxLength: 10
          description: Abreviação curta do insumo (deve ser única)
          example: ARE-A
        group:
          $ref: '#/components/schemas/SupplyGroup'
        externalId:
          type: string
          maxLength: 100
          description: Referência única do sistema externo (obrigatório apenas na criação)
          example: EXT-SUP-001
        composeMortar:
          type: boolean
          description: Se este insumo é um componente de argamassa
          default: true
          example: true
        active:
          type: boolean
          description: Se o insumo está ativo
          default: true
          example: true
        classificationSupplyTypeId:
          type: string
          format: uuid
          description: UUID do tipo de classificação de insumo a ser associado (alternativa ao `classificationSupplyTypeExternalId`)
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        classificationSupplyTypeExternalId:
          type: string
          description: ID externo do tipo de classificação de insumo a ser associado (alternativa ao `classificationSupplyTypeId`)
          example: EXT-CST-001

    Supply:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identificador interno único do insumo
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        numeration:
          type: integer
          description: Número sequencial gerado pelo sistema para o insumo
          example: 15
        name:
          type: string
          maxLength: 50
          description: Nome do material de insumo
          example: Areia Tipo A
        abbreviation:
          type: string
          maxLength: 10
          description: Abreviação curta do insumo
          example: ARE-A
        active:
          type: boolean
          description: Se o insumo está ativo
          example: true
        composeMortar:
          type: boolean
          description: Se este insumo é um componente de argamassa
          example: true
        externalId:
          type: string
          maxLength: 100
          description: Identificador de referência do sistema externo
          example: EXT-SUP-001
        group:
          $ref: '#/components/schemas/SupplyGroup'
        classificationSupplyType:
          $ref: '#/components/schemas/ClassificationSupplyType'
        createdAt:
          type: string
          format: date-time
          description: Data e hora em que o registro foi criado
          example: "2025-01-15T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: Data e hora da última atualização do registro
          example: "2025-01-15T10:30:00"

    SupplyResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/Supply'

    SupplyListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: '#/components/schemas/Supply'

    # ── Custo de Insumo ──
    CostSupplyInput:
      type: object
      required: [costValue, freightValue, conversionFactor, effectiveDate, externalId]
      properties:
        active:
          type: boolean
          description: Se o registro de custo de insumo está ativo
          default: true
          example: true
        costValue:
          type: number
          format: double
          description: Valor de custo do insumo por unidade
          example: 125.50
        freightValue:
          type: number
          format: double
          description: Valor de frete/transporte por unidade
          example: 15.00
        conversionFactor:
          type: number
          format: double
          description: Fator de conversão entre unidades de compra e uso
          example: 1.0
        effectiveDate:
          type: string
          format: date
          description: Data em que este custo entra em vigência
          example: "2025-03-01"
        lossPercentage:
          type: number
          format: double
          description: Percentual de perda do insumo durante o processo de produção
          default: 0
          example: 2.5
        sandMoistureLevel:
          type: number
          format: double
          description: Percentual de umidade do material de insumo
          default: 0
          example: 0
        externalId:
          type: string
          maxLength: 100
          description: Referência única do sistema externo (obrigatório apenas na criação)
          example: EXT-CS-001
        supplyId:
          type: string
          format: uuid
          description: UUID do insumo vinculado (alternativa ao `supplyExternalId`)
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        supplyExternalId:
          type: string
          maxLength: 100
          description: ID externo do insumo vinculado (alternativa ao `supplyId`)
          example: EXT-SUP-001
        supplierId:
          type: string
          format: uuid
          description: UUID do fornecedor vinculado (alternativa ao `supplierExternalId`)
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        supplierExternalId:
          type: string
          maxLength: 100
          description: ID externo do fornecedor vinculado (alternativa ao `supplierId`)
          example: EXT-SUPPLIER-001
        concreteBatchingPlantId:
          type: string
          format: uuid
          description: UUID da central de dosagem vinculada (alternativa ao `concreteBatchingPlantExternalId`)
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        concreteBatchingPlantExternalId:
          type: string
          maxLength: 100
          description: ID externo da central de dosagem vinculada (alternativa ao `concreteBatchingPlantId`)
          example: EXT-CBP-001
        purchaseMeasureUnitTypeId:
          type: string
          format: uuid
          description: UUID da unidade de medida de compra (alternativa ao `purchaseMeasureUnitTypeExternalId`)
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        purchaseMeasureUnitTypeExternalId:
          type: string
          maxLength: 100
          description: ID externo da unidade de medida de compra (alternativa ao `purchaseMeasureUnitTypeId`)
          example: EXT-MUT-KG
        useMeasureUnitTypeId:
          type: string
          format: uuid
