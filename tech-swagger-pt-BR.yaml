  /integrations/supplies:
    post:
      tags: [Supplies]
      summary: Criar um novo insumo
      description: |
        Cria um único registro de insumo (material). Os campos `name`, `abbreviation` e `externalId`
        devem ser únicos. Opcionalmente vincule a um tipo de classificação de insumo utilizando
        `classificationSupplyTypeId` ou `classificationSupplyTypeExternalId`.
      operationId: createSupply
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupplyInput'
            example:
              name: Areia Tipo A
              abbreviation: ARE-A
              group: FINE_AGGREGATE
              externalId: EXT-SUP-001
              composeMortar: true
              active: true
      responses:
        '201':
          description: Insumo criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplyResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST https://api.topconsuite.io/tech-hml/integrations/supplies \
              -H "Authorization: Bearer <token>" \
              -H "Ocp-Apim-Subscription-Key: <key>" \
              -H "Content-Type: application/json" \
              -d '{"name":"Areia Tipo A","abbreviation":"ARE-A","group":"FINE_AGGREGATE","externalId":"EXT-SUP-001","composeMortar":true,"active":true}'
        - lang: javascript
          source: |
            const response = await fetch('https://api.topconsuite.io/tech-hml/integrations/supplies', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer <token>',
                'Ocp-Apim-Subscription-Key': '<key>',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                name: 'Areia Tipo A',
                abbreviation: 'ARE-A',
                group: 'FINE_AGGREGATE',
                externalId: 'EXT-SUP-001',
                composeMortar: true,
                active: true
              })
            });
          
            const data = await response.json();
        - lang: csharp
          source: |
            using System.Net.Http;
            using System.Net.Http.Headers;
            using System.Net.Http.Json;
          
            using var httpClient = new HttpClient();
            httpClient.DefaultRequestHeaders.Authorization = new AuthenticationHeaderValue("Bearer", "<token>");
            httpClient.DefaultRequestHeaders.Add("Ocp-Apim-Subscription-Key", "<key>");
          
            var response = await httpClient.PostAsJsonAsync(
                "https://api.topconsuite.io/tech-hml/integrations/supplies",
                new
                {
                    name = "Areia Tipo A",
                    abbreviation = "ARE-A",
                    group = "FINE_AGGREGATE",
                    externalId = "EXT-SUP-001",
                    composeMortar = true,
                    active = true
                });
          
            var payload = await response.Content.ReadAsStringAsync();
        - lang: python
          source: |
            import requests
          
            response = requests.post(
                'https://api.topconsuite.io/tech-hml/integrations/supplies',
                headers={
                    'Authorization': 'Bearer <token>',
                    'Ocp-Apim-Subscription-Key': '<key>'
                },
                json={
                    'name': 'Areia Tipo A',
                    'abbreviation': 'ARE-A',
                    'group': 'FINE_AGGREGATE',
                    'externalId': 'EXT-SUP-001',
                    'composeMortar': True,
                    'active': True
                }
            )
          
            data = response.json()
