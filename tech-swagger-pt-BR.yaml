          type: string
          maxLength: 100
          description: ID externo da unidade de medida de uso (alternativa ao `useMeasureUnitTypeId`)
          example: EXT-MUT-KG

    CostSupply:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identificador interno único do registro de custo de insumo
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        active:
          type: boolean
          description: Se o registro de custo de insumo está ativo
