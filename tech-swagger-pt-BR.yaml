      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: '#/components/schemas/CostSupply'

    # ── Dado Técnico de Insumo ──
    TechnicalDataSupplyInput:
      type: object
      required: [specificMass, unitMass, effectiveDate, externalId]
      properties:
        specificMass:
          type: number
          format: double
          description: Massa específica do material de insumo (kg/m³)
          example: 2650.0
        unitMass:
          type: number
          format: double
          description: Massa unitária do material de insumo (kg/m³)
          example: 1520.0
        effectiveDate:
          type: string
          format: date
          description: Data em que este dado técnico entra em vigência (deve ser único por combinação insumo/central/fornecedor)
          example: "2025-03-01"
        isDefaultSupplySupplier:
          type: boolean
          description: Se este registro é o dado técnico padrão para o par insumo-fornecedor
          default: true
          example: true
        active:
          type: boolean
          description: Se o registro de dado técnico de insumo está ativo
          default: true
          example: true
        externalId:
          type: string
          maxLength: 100
          description: Referência única do sistema externo (obrigatório apenas na criação)
          example: EXT-TDS-001
        supplyId:
          type: string
          format: uuid
          description: UUID do insumo vinculado (alternativa ao `supplyExternalId`)
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        supplyExternalId:
          type: string
          description: ID externo do insumo vinculado (alternativa ao `supplyId`)
          example: EXT-SUP-001
        supplierId:
          type: string
          format: uuid
          description: UUID do fornecedor vinculado (alternativa ao `supplierExternalId`)
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        supplierExternalId:
          type: string
          description: ID externo do fornecedor vinculado (alternativa ao `supplierId`)
          example: EXT-SUPPLIER-001
        concreteBatchingPlantId:
          type: string
          format: uuid
          description: UUID da central de dosagem vinculada (alternativa ao `concreteBatchingPlantExternalId`)
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        concreteBatchingPlantExternalId:
          type: string
          description: ID externo da central de dosagem vinculada (alternativa ao `concreteBatchingPlantId`)
          example: EXT-CBP-001

    TechnicalDataSupply:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identificador interno único do registro de dado técnico de insumo
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        specificMass:
          type: number
          format: double
          description: Massa específica do material de insumo (kg/m³)
          example: 2650.0
        unitMass:
          type: number
          format: double
          description: Massa unitária do material de insumo (kg/m³)
          example: 1520.0
        effectiveDate:
          type: string
          format: date
          description: Data em que este dado técnico entrou em vigência
          example: "2025-03-01"
        isDefaultSupplySupplier:
          type: boolean
          description: Se este é o dado técnico padrão para o par insumo-fornecedor
          example: true
        active:
          type: boolean
          description: Se o registro de dado técnico de insumo está ativo
          example: true
        externalId:
          type: string
          maxLength: 100
          description: Identificador de referência do sistema externo
          example: EXT-TDS-001
        concreteBatchingPlant:
          $ref: '#/components/schemas/ConcreteBatchingPlant'
        supplier:
          $ref: '#/components/schemas/Supplier'
        supply:
          $ref: '#/components/schemas/Supply'
        createdAt:
          type: string
          format: date-time
          description: Data e hora em que o registro foi criado
          example: "2025-01-15T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: Data e hora da última atualização do registro
          example: "2025-01-15T10:30:00"

    TechnicalDataSupplyResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              $ref: '#/components/schemas/TechnicalDataSupply'

    TechnicalDataSupplyListResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            result:
              type: array
              items:
                $ref: '#/components/schemas/TechnicalDataSupply'

    # ── Família de Receita de Concreto ──
    ProductType:
      type: string
      enum: [NORMAL, SPECIAL, MORTAR]
      description: Classificação de tipo do grupo de produto
      example: NORMAL

    ProductGroup:
      type: object
      properties:
        externalId:
          type: string
          maxLength: 100
          description: Identificador de referência do sistema externo para o grupo de produto
          example: EXT-PG-001
        name:
          type: string
          maxLength: 130
          description: Nome do grupo de produto
          example: Concreto Convencional
        abbreviation:
          type: string
          maxLength: 130
          description: Abreviação do grupo de produto
          example: CC
        active:
          type: boolean
          description: Se o grupo de produto está ativo
          example: true
        special:
          type: boolean
          description: Se este é um grupo de produto especial
          example: false
        productType:
          $ref: '#/components/schemas/ProductType'

    Gravel:
      type: object
      properties:
        externalId:
          type: string
          maxLength: 100
          description: Identificador de referência do sistema externo para o tipo de brita
          example: EXT-GRV-001
        name:
          type: string
          maxLength: 130
          description: Nome do tipo de brita
          example: Brita 19mm
        description:
          type: string
          maxLength: 130
          description: Descrição do tipo de brita
          example: Brita britada com diâmetro máximo de 19mm
        active:
          type: boolean
          description: Se o tipo de brita está ativo
          example: true
        fixed:
          type: boolean
          description: Se este é um tipo de brita definido pelo sistema
          example: false

    Slump:
      type: object
      properties:
        externalId:
          type: string
          maxLength: 100
          description: Identificador de referência do sistema externo para a especificação de slump
          example: EXT-SLM-001
        value:
          type: number
          format: double
          description: Valor alvo de slump
          example: 100.0
        amplitude:
          type: number
          format: double
          description: Tolerância de amplitude aceitável para a medição de slump
          example: 20.0
        active:
          type: boolean
          description: Se a especificação de slump está ativa
          example: true
        unitTypeId:
          type: string
          format: uuid
          description: UUID do tipo de unidade de medida para este valor de slump
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        ClassTypeId:
          type: string
          format: uuid
          description: UUID do tipo de classificação relacionado a este slump
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6

    ConcreteRecipeFamily:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Identificador interno único da família de receita de concreto
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        externalId:
          type: string
          maxLength: 100
          description: Identificador de referência do sistema externo
          example: EXT-CRF-001
        active:
          type: boolean
          description: Se a família de receita está ativa
          example: true
        commercialDefault:
          type: boolean
          description: Se esta é a família de receita comercial padrão
          example: true
        specification:
          type: string
          maxLength: 130
          description: Especificação técnica da família de receita
          example: "FCK 25 MPA - Slump 100±20 - Brita 19mm"
        numeration:
          type: integer
          description: Número sequencial gerado pelo sistema para a família de receita
          example: 1
        currentVersionId:
          type: string
          format: uuid
          description: UUID da versão atualmente ativa desta família de receita
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        lastVersionId:
          type: string
          format: uuid
          description: UUID da versão mais recente desta família de receita
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        createdAt:
          type: string
          format: date-time
          description: Data e hora em que o registro foi criado
          example: "2025-01-15T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: Data e hora da última atualização do registro
          example: "2025-01-15T10:30:00"
        concreteBatchingPlant:
          $ref: '#/components/schemas/ConcreteBatchingPlant'
        productGroup:
          $ref: '#/components/schemas/ProductGroup'
        gravel:
          $ref: '#/components/schemas/Gravel'
        slump:
          $ref: '#/components/schemas/Slump'
        slumpInitial:
          $ref: '#/components/schemas/Slump'

    ConcreteRecipeFamilyResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
