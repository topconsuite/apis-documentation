          example: "2025-03-01"
        lossPercentage:
          type: number
          format: double
          description: Percentual de perda do insumo durante a produção
          example: 2.5
        sandMoistureLevel:
          type: number
          format: double
          description: Percentual de umidade do material de insumo
          example: 0
        externalId:
          type: string
          maxLength: 100
          description: Identificador de referência do sistema externo
          example: EXT-CS-001
        concreteBatchingPlant:
          $ref: '#/components/schemas/ConcreteBatchingPlant'
        supplier:
          $ref: '#/components/schemas/Supplier'
        supply:
          $ref: '#/components/schemas/Supply'
        purchaseMeasureUnitType:
          $ref: '#/components/schemas/MeasureUnitType'
        useMeasureUnitType:
          $ref: '#/components/schemas/MeasureUnitType'
        createdAt:
          type: string
          format: date-time
          description: Data e hora em que o registro foi criado
          example: "2025-01-15T10:30:00"
        updatedAt:
          type: string
          format: date-time
          description: Data e hora da última atualização do registro
          example: "2025-01-15T10:30:00"

    CostSupplyResponse:
